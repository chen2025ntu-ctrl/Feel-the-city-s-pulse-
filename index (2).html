<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>脉 PULSE · 城市生活探索 Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink-900:#070A12; --ink-850:#0A0E1A; --ink-800:#0D1220; --ink-700:#121829;
  --ink-650:#161D32; --ink-600:#1B2440; --line:#26304F; --line-soft:#1C2440;
  --mist:#646E91; --haze:#97A1C4; --snow:#E9EDF9; --white:#FBFCFF;
  --coral:#FF5B36; --heat-1:#FF3D24; --heat-2:#FF7A33; --heat-3:#FFC24B;
  --cyan:#27E0BE; --cyan-deep:#0E9C86;
  --violet:#8C6BFF; --violet-deep:#5E45C9;
  --accent:var(--coral); --accent-soft:rgba(255,91,54,.14);
  --f-display:'Space Grotesk','Noto Sans SC',sans-serif;
  --f-body:'Plus Jakarta Sans','Noto Sans SC',-apple-system,system-ui,sans-serif;
  --f-mono:'Space Mono','Noto Sans SC',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--f-body); color:var(--snow);
  background:
    radial-gradient(120% 70% at 18% -8%, rgba(255,91,54,.10), transparent 55%),
    radial-gradient(110% 60% at 92% 8%, rgba(140,107,255,.10), transparent 55%),
    radial-gradient(120% 80% at 50% 120%, rgba(39,224,190,.08), transparent 60%),
    #05070D;
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  padding:34px 16px 56px; gap:22px;
}
::selection{background:rgba(255,91,54,.32)}

.intro{width:min(420px,100%);text-align:center}
.brand{display:inline-flex;align-items:baseline;gap:10px;font-family:var(--f-display)}
.brand .glyph{font-size:34px;font-weight:700;letter-spacing:-1px;
  background:linear-gradient(120deg,#FFD08A,var(--coral) 45%,var(--violet));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand .wm{font-size:15px;font-weight:600;letter-spacing:6px;color:var(--haze)}
.intro p{margin-top:9px;color:var(--mist);font-size:13px;line-height:1.6}
.langpill{display:inline-flex;margin:13px auto 0;background:var(--ink-700);border:1px solid var(--line);border-radius:999px;padding:3px}
.langpill button{font-family:var(--f-body);font-size:11.5px;font-weight:600;color:var(--haze);background:none;border:none;padding:6px 17px;border-radius:999px;cursor:pointer;transition:all .2s}
.langpill button.on{background:linear-gradient(120deg,var(--coral),var(--violet));color:#fff}
.intro .lines{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:13px}
.lines span{font-size:11px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);
  color:var(--haze);font-weight:500;display:inline-flex;align-items:center;gap:6px}
.lines span i{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-c{background:var(--coral)} .dot-v{background:var(--violet)} .dot-y{background:var(--cyan)}

.phone{width:392px;max-width:100%;height:838px;border-radius:46px;position:relative;background:var(--ink-850);
  box-shadow:0 0 0 11px #11131c,0 0 0 12px #2a2d3b,0 40px 90px -30px rgba(0,0,0,.9),0 0 120px -40px rgba(255,91,54,.25);
  overflow:hidden;display:flex;flex-direction:column}
.statusbar{height:50px;flex:none;display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 26px 7px;font-family:var(--f-mono);font-size:13px;letter-spacing:.5px;color:var(--snow);z-index:60;position:relative}
.notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:104px;height:27px;background:#05070d;border-radius:16px;z-index:61}
.sb-right{display:flex;gap:7px;align-items:center;opacity:.9}
.sb-right svg{display:block}

.app{flex:1;position:relative;overflow:hidden;--accent:var(--coral)}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;opacity:0;visibility:hidden;
  transform:translateY(8px);transition:opacity .32s ease,transform .32s ease,visibility .32s;
  -webkit-overflow-scrolling:touch;padding-bottom:96px}
.screen.active{opacity:1;visibility:visible;transform:none}
.screen::-webkit-scrollbar{display:none}.screen{scrollbar-width:none}

.pad{padding:0 18px}
.eyebrow{font-family:var(--f-mono);font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mist)}
.h1{font-family:var(--f-display);font-weight:700;font-size:25px;letter-spacing:-.5px;line-height:1.1}
.h2{font-family:var(--f-display);font-weight:600;font-size:16px;letter-spacing:-.2px}
.sub{color:var(--haze);font-size:12.5px;line-height:1.55}
.mono{font-family:var(--f-mono)}
.chip{font-size:11px;padding:4px 9px;border-radius:8px;font-weight:600;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.tag-art{background:rgba(140,107,255,.16);color:#b9a6ff}
.tag-tech{background:rgba(39,224,190,.14);color:#5eead4}
.tag-music{background:rgba(255,91,54,.16);color:#ff9576}
.tag-market{background:rgba(255,194,75,.16);color:#ffce7a}
.tag-coffee{background:rgba(255,150,90,.14);color:#ffb188}
.tag-build{background:rgba(150,170,220,.14);color:#aeb9e0}
.tag-hot{background:linear-gradient(100deg,var(--heat-1),var(--heat-2));color:#fff}
.tag-new{background:rgba(233,237,249,.1);color:var(--snow)}
.card{background:var(--ink-700);border:1px solid var(--line-soft);border-radius:18px}
.btn{font-family:var(--f-body);font-weight:600;font-size:13.5px;border:none;border-radius:13px;padding:13px;cursor:pointer;color:#fff;background:var(--accent);transition:transform .12s,filter .2s}
.btn:active{transform:scale(.97)}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--snow)}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 12px}
.loc{display:flex;align-items:center;gap:7px;font-weight:600;font-size:14px}
.loc small{color:var(--mist);font-weight:500}
.av{width:34px;height:34px;border-radius:50%;background:conic-gradient(from 200deg,#FFB36b,#FF5B36,#8C6BFF,#27E0BE,#FFB36b);padding:2px}
.av i{display:block;width:100%;height:100%;border-radius:50%;background:var(--ink-700);display:grid;place-items:center;font-size:13px;color:var(--snow);font-weight:700}
.search{display:flex;align-items:center;gap:9px;background:var(--ink-700);border:1px solid var(--line-soft);border-radius:14px;padding:11px 14px;margin:0 18px 12px;color:var(--mist);font-size:13px}

.mapwrap{position:relative;margin:0 18px 14px;border-radius:22px;overflow:hidden;border:1px solid var(--line);height:330px;background:var(--ink-900)}
.mapwrap svg{display:block;width:100%;height:100%}
.heatlayer,.pinlayer{transition:opacity .55s ease}
.map-mode-pins .heatlayer{opacity:0} .map-mode-pins .pinlayer{opacity:1}
.map-mode-heat .heatlayer{opacity:1} .map-mode-heat .pinlayer{opacity:0}
.maptoggle{position:absolute;top:12px;left:12px;display:flex;background:rgba(7,10,18,.72);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:11px;padding:3px;z-index:5}
.maptoggle button{font-family:var(--f-body);font-size:11.5px;font-weight:600;color:var(--haze);background:none;border:none;padding:7px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px}
.maptoggle button.on{background:var(--coral);color:#fff}
.maptoggle button.on.heat{background:linear-gradient(100deg,var(--heat-1),var(--heat-2))}
.maptag{position:absolute;font-family:var(--f-mono);font-size:10px;font-weight:700;letter-spacing:.3px;padding:4px 8px;border-radius:8px;background:rgba(7,10,18,.78);border:1px solid var(--line);white-space:nowrap;z-index:4;pointer-events:none}
.maptag b{color:var(--heat-3)}
.you-chip{position:absolute;z-index:4;font-family:var(--f-mono);font-size:9.5px;color:var(--cyan);background:rgba(7,10,18,.8);border:1px solid rgba(39,224,190,.4);padding:3px 7px;border-radius:7px;pointer-events:none}
.legend{position:absolute;bottom:12px;left:12px;display:flex;gap:10px;font-family:var(--f-mono);font-size:9px;color:var(--haze);background:rgba(7,10,18,.7);padding:6px 9px;border-radius:9px;border:1px solid var(--line);z-index:4}
.legend span{display:flex;align-items:center;gap:4px}
.legend i{width:8px;height:8px;border-radius:2px;display:inline-block}

.anomaly{margin:0 18px 16px;border-radius:16px;padding:13px 14px;display:flex;gap:11px;align-items:flex-start;background:linear-gradient(115deg,rgba(255,61,36,.16),rgba(255,122,51,.07));border:1px solid rgba(255,91,54,.32);position:relative;overflow:hidden}
.anomaly .bolt{flex:none;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:linear-gradient(135deg,var(--heat-1),var(--heat-2))}
.anomaly h4{font-size:13px;font-weight:700;margin-bottom:3px}
.anomaly p{font-size:11.5px;color:var(--haze);line-height:1.5}
.anomaly .mult{font-family:var(--f-mono);color:var(--heat-3);font-weight:700}

.sec-head{display:flex;align-items:baseline;justify-content:space-between;padding:4px 18px 11px}
.sec-head .more{font-size:11.5px;color:var(--accent);font-weight:600}
.feed{padding:0 18px;display:flex;flex-direction:column;gap:11px}
.act{display:flex;gap:12px;padding:12px;cursor:pointer;transition:border-color .2s,transform .12s}
.act:active{transform:scale(.985)}
.act .thumb{width:62px;height:62px;border-radius:13px;flex:none;position:relative;overflow:hidden}
.act .body{flex:1;min-width:0}
.act .row1{display:flex;gap:7px;align-items:center;margin-bottom:5px;flex-wrap:wrap}
.act h3{font-size:14px;font-weight:600;line-height:1.25;margin-bottom:5px}
.act .meta{font-family:var(--f-mono);font-size:10.5px;color:var(--mist);display:flex;gap:9px;flex-wrap:wrap}
.act .meta b{color:var(--cyan)} .act .meta .live{color:var(--heat-2)}

.ph{position:relative;overflow:hidden}
.ph::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 120% at 70% 10%,transparent,rgba(0,0,0,.34));z-index:1}
.ph>img.rimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .55s ease;z-index:0}
.ph>img.rimg.on{opacity:1}
.ph-teamlab{background:linear-gradient(140deg,#1b1140,#3b1f87 40%,#6b2bb0 70%,#ff5b9c)}
.ph-rust{background:linear-gradient(140deg,#11202b,#1c3a44 55%,#d97a3a)}
.ph-coffee{background:linear-gradient(140deg,#2a1a10,#5c3a1f 55%,#caa06a)}
.ph-music{background:linear-gradient(140deg,#2a0f2c,#7a1f4a 45%,#ff7a33 90%)}
.ph-expo{background:linear-gradient(140deg,#101a3a,#23408c 50%,#3fd0d0)}
.ph-arch{background:linear-gradient(140deg,#1a1d26,#3a3f52 60%,#8a93b5)}
.ph-book{background:linear-gradient(140deg,#241a0f,#5a4326 55%,#cbb27a)}
.ph-graf{background:linear-gradient(140deg,#0f2233,#1f5a6b 45%,#27e0be)}
.ph-ucca{background:linear-gradient(140deg,#1a0f2e,#46237a 55%,#b06bd0)}

.searchbig{margin:2px 18px 14px;background:var(--ink-700);border:1px solid var(--line);border-radius:15px;display:flex;align-items:center;gap:10px;padding:13px 15px}
.searchbig input{flex:1;background:none;border:none;outline:none;color:var(--snow);font-family:var(--f-body);font-size:13.5px}
.qchips{display:flex;gap:8px;padding:0 18px 16px;flex-wrap:wrap}
.qchips button{font-family:var(--f-body);font-size:12px;font-weight:600;color:var(--haze);background:var(--ink-700);border:1px solid var(--line-soft);border-radius:999px;padding:8px 14px;cursor:pointer;transition:all .2s}
.qchips button.on{background:var(--violet);color:#fff;border-color:transparent}
.match-head{margin:0 18px 12px;padding:14px;border-radius:16px;background:linear-gradient(120deg,rgba(140,107,255,.16),rgba(94,69,201,.06));border:1px solid rgba(140,107,255,.3)}
.match-head h3{font-size:14.5px;font-weight:700;margin-bottom:4px}
.match-head p{font-size:11.5px;color:var(--haze);line-height:1.5}
.match-head .pct{font-family:var(--f-mono);color:#b9a6ff;font-weight:700}
.venue{margin:0 18px 11px;padding:13px;display:flex;gap:12px;align-items:center;cursor:pointer}
.venue .rank{font-family:var(--f-mono);font-size:13px;font-weight:700;color:var(--violet);width:18px;flex:none}
.venue .thumb{width:54px;height:54px;border-radius:12px;flex:none}
.venue .body{flex:1;min-width:0}
.venue h4{font-size:13.5px;font-weight:600;margin-bottom:3px}
.venue .meta{font-family:var(--f-mono);font-size:10px;color:var(--mist)}
.avstack{display:flex;align-items:center}
.avstack i{width:21px;height:21px;border-radius:50%;border:2px solid var(--ink-700);margin-left:-7px;font-size:9px;display:grid;place-items:center;font-weight:700;color:#fff}
.avstack i:first-child{margin-left:0}
.avstack .cnt{font-family:var(--f-mono);font-size:10px;color:#b9a6ff;margin-left:6px;font-weight:700}
.circle-card{margin:14px 18px 4px;padding:15px;border-radius:18px;background:var(--ink-700);border:1px solid var(--line);position:relative;overflow:hidden}
.circle-card .glow{position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(140,107,255,.4),transparent 70%)}
.circle-card .eyebrow{margin-bottom:9px}
.circle-card h3{font-size:15px;font-weight:700;margin-bottom:6px;position:relative}
.circle-card p{font-size:12px;color:var(--haze);line-height:1.5;margin-bottom:13px;position:relative}
.circle-card .foot{display:flex;align-items:center;justify-content:space-between;position:relative;gap:10px}

.foot-hero{margin:2px 18px 16px;border-radius:22px;overflow:hidden;border:1px solid var(--line);position:relative;height:212px;background:var(--ink-900)}
.foot-hero svg{width:100%;height:100%;display:block}
.foot-stats{position:absolute;left:0;right:0;bottom:0;padding:13px 15px;display:flex;justify-content:space-between;background:linear-gradient(0deg,rgba(7,10,18,.92),transparent)}
.foot-stats .num{font-family:var(--f-mono);font-size:21px;font-weight:700;color:var(--cyan);line-height:1}
.foot-stats .lab{font-size:10px;color:var(--haze);margin-top:4px}
.foot-stats .div{width:1px;background:var(--line);margin:2px 0}
.timeline{padding:0 18px;position:relative}
.tl-month{font-family:var(--f-mono);font-size:11px;letter-spacing:2px;color:var(--mist);margin:6px 0 12px;display:flex;align-items:center;gap:9px}
.tl-month::after{content:"";flex:1;height:1px;background:var(--line-soft)}
.tl-item{display:flex;gap:13px;margin-bottom:16px;cursor:pointer}
.tl-rail{flex:none;width:14px;display:flex;flex-direction:column;align-items:center;padding-top:5px}
.tl-rail .node{width:11px;height:11px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 4px rgba(39,224,190,.15)}
.tl-rail .line{flex:1;width:2px;background:var(--line-soft);margin-top:5px}
.tl-card{flex:1;min-width:0}
.tl-card .date{font-family:var(--f-mono);font-size:10px;color:var(--mist);margin-bottom:7px}
.tl-card .head{display:flex;gap:7px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.tl-card h3{font-size:14px;font-weight:600}
.tl-card .place{font-size:11.5px;color:var(--haze);margin-bottom:9px;display:flex;align-items:center;gap:5px}
.tl-photos{display:flex;gap:6px;margin-bottom:9px}
.tl-photos .ph{width:52px;height:52px;border-radius:10px;flex:none}
.tl-photos .ph.more{background:var(--ink-600);display:grid;place-items:center;font-family:var(--f-mono);font-size:11px;color:var(--haze)}
.note{background:var(--ink-800);border:1px solid var(--line-soft);border-radius:12px;padding:10px 12px;display:flex;gap:10px;align-items:center}
.note.text p{font-size:11.5px;color:var(--snow);line-height:1.5;font-style:italic}
.note .voicebtn{flex:none;width:28px;height:28px;border-radius:50%;background:var(--cyan);display:grid;place-items:center;cursor:pointer}
.wave{flex:1;display:flex;align-items:center;gap:2.5px;height:24px}
.wave span{flex:1;background:rgba(39,224,190,.45);border-radius:2px;min-height:3px}
.note .dur{font-family:var(--f-mono);font-size:10px;color:var(--haze);flex:none}

.profile{display:flex;align-items:center;gap:14px;padding:6px 18px 18px}
.profile .pic{width:62px;height:62px;border-radius:50%;background:conic-gradient(from 160deg,#FFB36b,#FF5B36,#8C6BFF,#27E0BE,#FFB36b);padding:3px;flex:none}
.profile .pic i{display:grid;place-items:center;width:100%;height:100%;border-radius:50%;background:var(--ink-700);font-size:20px;font-weight:700}
.profile h2{font-family:var(--f-display);font-size:19px;font-weight:700}
.profile p{font-size:11.5px;color:var(--mist);font-family:var(--f-mono);margin-top:3px}
.block{margin:0 18px 16px;padding:16px;border-radius:18px;background:var(--ink-700);border:1px solid var(--line-soft)}
.block > .eyebrow{margin-bottom:13px;display:block}
.taste{display:flex;flex-direction:column;gap:11px}
.taste .row{display:flex;align-items:center;gap:11px}
.taste .nm{width:84px;font-size:12px;font-weight:600;flex:none}
.taste .bar{flex:1;height:7px;border-radius:4px;background:var(--ink-850);overflow:hidden}
.taste .bar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--violet),var(--coral))}
.taste .v{font-family:var(--f-mono);font-size:10.5px;color:var(--haze);width:24px;text-align:right;flex:none}
.learn{margin-top:13px;font-size:10.5px;color:var(--mist);display:flex;align-items:center;gap:6px;line-height:1.4}
.seg{display:flex;background:var(--ink-850);border-radius:12px;padding:4px;gap:4px;margin-bottom:14px}
.seg button{flex:1;font-family:var(--f-body);font-size:12.5px;font-weight:600;color:var(--haze);background:none;border:none;padding:9px;border-radius:9px;cursor:pointer}
.seg button.on{background:var(--cyan);color:#062b25}
.seg.lang button.on{background:linear-gradient(120deg,var(--coral),var(--violet));color:#fff}
.optrow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-top:1px solid var(--line-soft)}
.optrow:first-of-type{border-top:none}
.optrow .t{font-size:13px;font-weight:600}
.optrow .d{font-size:11px;color:var(--mist);margin-top:2px}
.toggle{width:42px;height:25px;border-radius:999px;background:var(--ink-600);position:relative;cursor:pointer;flex:none;transition:background .2s}
.toggle i{position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on{background:var(--cyan)} .toggle.on i{left:20px}
.preview{margin:2px 18px 0;border-radius:20px;overflow:hidden;border:1px solid var(--line);background:linear-gradient(170deg,var(--ink-700),var(--ink-850))}
.preview .pv-top{padding:15px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line-soft)}
.preview .pv-top .pic{width:38px;height:38px;border-radius:50%;background:conic-gradient(from 160deg,#FF5B36,#8C6BFF,#27E0BE,#FF5B36);padding:2px}
.preview .pv-top .pic i{display:grid;place-items:center;width:100%;height:100%;border-radius:50%;background:var(--ink-700);font-size:13px;font-weight:700}
.preview .pv-top .name{font-size:13.5px;font-weight:700}
.preview .pv-top .span{font-family:var(--f-mono);font-size:10px;color:var(--cyan);margin-top:2px}
.pv-sec{padding:13px 16px}
.pv-sec .lab{font-family:var(--f-mono);font-size:9.5px;letter-spacing:1.5px;color:var(--mist);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.pv-trail{display:flex;gap:6px;margin-bottom:3px}
.pv-trail .ph{width:46px;height:46px;border-radius:9px;flex:none}
.pv-future{display:flex;gap:10px;align-items:center;padding:11px;border-radius:13px;background:rgba(39,224,190,.07);border:1px dashed rgba(39,224,190,.4)}
.pv-future .ic{flex:none;width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));display:grid;place-items:center}
.pv-future h5{font-size:12.5px;font-weight:700}
.pv-future p{font-size:10.5px;color:var(--haze);margin-top:2px}

.overlay{position:absolute;inset:0;z-index:80;background:var(--ink-850);transform:translateY(101%);transition:transform .38s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding-bottom:30px}

.overlay::-webkit-scrollbar{display:none}.overlay{scrollbar-width:none}
.ov-bar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;background:linear-gradient(0deg,transparent,var(--ink-850) 40%)}

.route-map svg{width:100%;height:100%;display:block}

.poi-head{display:flex;align-items:baseline;justify-content:space-between;padding:2px 18px 11px}
.poi-head .cnt{font-family:var(--f-mono);font-size:11px;color:var(--coral);font-weight:700}
.poi{margin:0 18px 10px;padding:12px;display:flex;gap:12px;align-items:center}
.poi .thumb{width:48px;height:48px;border-radius:11px;flex:none}
.poi .body{flex:1;min-width:0}

.poi .meta{font-family:var(--f-mono);font-size:10px;color:var(--mist);display:flex;gap:8px;align-items:center}
.poi .meta .m{color:#b9a6ff}

.poi .add.added{background:var(--cyan);border-color:transparent;color:#062b25}
.route-explain{margin:2px 18px 0;font-size:11px;color:var(--mist);line-height:1.55;display:flex;gap:7px}
.route-direct-note{margin:4px 18px 0;font-size:11.5px;color:var(--haze);text-align:center;padding:18px}

@keyframes ring{0%{transform:scale(.6);opacity:.9}100%{transform:scale(2.4);opacity:0}}
@keyframes breathe{0%,100%{opacity:.85}50%{opacity:1}}
.pin-ring{transform-origin:center;animation:ring 2.6s ease-out infinite}
.heat-breathe{animation:breathe 4s ease-in-out infinite}
@media (prefers-reduced-motion:reduce){.pin-ring,.heat-breathe{animation:none}}

.hint{text-align:center;font-size:11px;color:var(--mist);margin-top:2px;width:min(420px,100%)}

let lang = 'zh';

function L(v){ return (v && typeof v==='object' && v.zh!==undefined) ? v[lang] : v; }
function K(k){ return I18N[k] ? I18N[k][lang] : k; }
function ppl(n){ return lang==='zh' ? (n+'位') : (n+''); }

function waveBars(n){let s='';for(let i=0;i<n;i++){s+='<span style="height:'+(20+Math.round(Math.sin(i*1.3)*9+(i*37%30)))+'%"></span>';}return s;}

function noteHTML(note){
  if(note.type==='voice') return '<div class="note"><div class="voicebtn" onclick="event.stopPropagation();toast(K(\'t_playvoice\'))"><svg width="12" height="12" viewBox="0 0 24 24" fill="#062b25"><path d="M8 5v14l11-7z"/></svg></div><div class="wave">'+waveBars(26)+'</div><span class="dur">'+note.dur+'</span></div>';
  return '<div class="note text"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2" style="flex:none;margin-top:1px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>\u201C'+L(note)+'\u201D</p></div>';
}

  curTopic = topic;
  const d = TRIBE[topic];
  document.querySelectorAll('#tribe-chips button').forEach(b=>b.classList.toggle('on', b.dataset.topic===topic));
  document.getElementById('tribe-input').value = L(d.input);
  document.getElementById('tribe-head').innerHTML = `<h3>${K('tribe_head')}</h3><p>${L(d.desc)}</p>`;
  document.getElementById('tribe-list').innerHTML = d.venues.map((v,i)=>`
    <div class="venue card" data-nm="${L(v.name)}" onclick="venueTap(this)">
      <span class="rank">${String(i+1).padStart(2,'0')}</span>
      <div class="thumb ph ${v.ph}"></div>
      <div class="body"><h4>${L(v.name)}</h4><div class="meta">${L(v.meta)}</div></div>

  updatePoiCount();
}
function updatePoiCount(){
  document.getElementById('poi-count').textContent = lang==='zh' ? ('已加入 '+addedCount+' 处') : (addedCount+' added');

function togglePoi(id){
  added[id]=!added[id];
  addedCount = Object.values(added).filter(Boolean).length;
  const el=document.getElementById('add-'+id);
  el.classList.toggle('added', added[id]); el.textContent = added[id]?'\u2713':'\uFF0B';
  updatePoiCount();
  if(added[id]) toast(K('t_poiadd'));
}

      <div class="mini-map"><svg viewBox="0 0 320 118" preserveAspectRatio="xMidYMid slice"><rect width="320" height="118" fill="#070A12"/><g stroke="#1b2440" stroke-width="2" fill="none"><path d="M-10 40 L330 36"/><path d="M-10 86 L330 92"/><path d="M120 -10 L130 130"/></g><path d="M30 95 C 90 70, 120 60, 230 40" fill="none" stroke="#27E0BE" stroke-width="2" stroke-dasharray="3 5" opacity=".6"/><g transform="translate(30,95)"><circle r="5" fill="#27E0BE"/></g><g transform="translate(230,40)"><circle class="pin-ring" r="9" fill="none" stroke="#FF5B36" stroke-width="2"/><circle r="6" fill="#FF5B36"/></g></svg></div>
      <div class="ov-actions">
        <button class="btn btn-ghost" onclick="toast(K('t_save'))"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px"><path d="M12 21l-1.4-1.3C5.4 15 2 11.9 2 8.2 2 5.5 4.1 3.5 6.8 3.5c1.5 0 3 .7 4 1.9 1-1.2 2.5-1.9 4-1.9 2.7 0 4.8 2 4.8 4.7 0 3.7-3.4 6.8-8.6 11.5z"/></svg>${K('det_save')}</button>
        <button class="btn" onclick="toast(K('t_attend'))">${K('det_attend')}</button>
        <button class="btn fullw" style="background:var(--coral)" onclick="navigate('route')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" style="vertical-align:-3px;margin-right:7px"><path d="M9 20l-5.5 2 2-6.5L17 3l4 4z"/><path d="M9 14l6-6"/></svg>${K('det_goroute')}</button>
      </div>`;
  }
  inner += `</div>`;
  const ov = document.getElementById('ov-detail');
  ov.innerHTML = inner;
  hydrateImages(ov);
}

/* ===================== REAL NETWORK PHOTOS ===================== */
const U = id => `https://images.unsplash.com/${id}?w=720&q=70&auto=format&fit=crop`;
const PH2IMG = {
  'ph-teamlab': U('photo-1748525938712-a065b4396ba4'),  // glowing colour light installation
  'ph-expo':    U('photo-1764692468585-e2c615a10882'),  // abstract red geometric reflections
  'ph-ucca':    U('photo-1730917643616-3c73cc31d68a'),  // crowd before a blue wall
  'ph-arch':    U('photo-1486406146926-c627a92ad1ab'),  // low-angle high-rise
  'ph-book':    U('photo-1569728723358-d1a317aa7fba'),  // books on a shelf
  'ph-graf':    U('photo-1487452066049-a710f7296400'),  // street art / mural
  'ph-music':   U('photo-1540039155733-5bb30b53aa14'),  // crowd facing a lit stage
  'ph-rust':    U('photo-1540575467063-178a50c2df87'),  // conference audience
  'ph-coffee':  U('photo-1609050471053-8636409f9f5b'),  // coffee, dark ceramic
};
function hydrateImages(root){
  (root||document).querySelectorAll('.ph').forEach(el=>{
    if(el.dataset.hydrated) return;
    let url=null;
    el.classList.forEach(c=>{ if(PH2IMG[c]) url=PH2IMG[c]; });
    if(!url) return;
    el.dataset.hydrated='1';
    const img=new Image();
    img.className='rimg'; img.alt=''; img.referrerPolicy='no-referrer'; img.loading='lazy';
    img.onload=()=>img.classList.add('on');
    img.onerror=()=>img.remove();   // graceful fallback to the gradient
    img.src=url;
    el.insertBefore(img, el.firstChild);
  });
}

/* ===================== ROUTER (real multi-page nav) ===================== */
let baseRoute='explore';
const ACC={explore:'coral',tribe:'violet',foot:'cyan',me:'snow'};
const COLOR={coral:'var(--coral)',violet:'var(--violet)',cyan:'var(--cyan)',snow:'var(--snow)'};
const SOFT={coral:'rgba(255,91,54,.14)',violet:'rgba(140,107,255,.16)',cyan:'rgba(39,224,190,.14)',snow:'rgba(233,237,249,.12)'};

function navigate(h){ location.hash = '#/'+h; }              // pushes a history entry
function closeTo(){ history.replaceState(null,'','#/'+(baseRoute||'explore')); route(); }

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>{ s.classList.remove('active'); s.scrollTop=0; });
  const el=document.getElementById('s-'+name); if(el) el.classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const tb=document.getElementById('tab-'+name); if(tb) tb.classList.add('on');
  const acc=ACC[name]||'coral', app=document.getElementById('app');
  app.style.setProperty('--accent', COLOR[acc]);
  app.style.setProperty('--accent-soft', SOFT[acc]);
}
function setOverlay(id){
  ['ov-detail','ov-route','ov-share'].forEach(o=>{
    const el=document.getElementById(o), on=(o===id);
    el.classList.toggle('open', on);
    if(on) el.scrollTop=0;
  });
  if(id!=='ov-detail') curDetail=null;
}
function route(){
  const parts=(location.hash||'').replace(/^#\/?/,'').split('/').filter(Boolean);
  const head=parts[0]||'explore';
  if(['explore','tribe','foot','me'].includes(head)){
    baseRoute=head; showScreen(head); setOverlay(null);
  } else if(head==='detail' && parts[1] && ACTS[parts[1]]){
    showScreen(baseRoute); openDetail(parts[1]); setOverlay('ov-detail');
  } else if(head==='route'){
    showScreen(baseRoute); setRoute(curRouteMode); setOverlay('ov-route');
  } else if(head==='share'){
    showScreen(baseRoute); refreshShare(); setOverlay('ov-share');
  } else {
    baseRoute='explore'; showScreen('explore'); setOverlay(null);
  }
}
window.addEventListener('hashchange', route);

function setMap(mode){
  const w=document.getElementById('mapwrap');
  w.classList.toggle('map-mode-heat', mode==='heat');
  w.classList.toggle('map-mode-pins', mode==='pins');
  document.getElementById('mt-live').classList.toggle('on', mode==='pins');
  const h=document.getElementById('mt-heat'); h.classList.toggle('on', mode==='heat'); h.classList.toggle('heat', mode==='heat');
  document.querySelectorAll('.heat-only').forEach(e=>e.style.display = mode==='heat'?'':'none');
}

function setRoute(mode){
  curRouteMode = mode;
  const ex = mode==='explore';
  document.getElementById('rm-explore').classList.toggle('on', ex);
  document.getElementById('rm-direct').classList.toggle('on', !ex);
  document.getElementById('path-explore').style.opacity = ex?'1':'0';
  document.getElementById('path-direct').style.opacity = ex?'0':'1';
  document.getElementById('poi-markers').style.opacity = ex?'1':'0';
  document.getElementById('route-explore-body').style.display = ex?'':'none';
  document.getElementById('route-direct-body').style.display = ex?'none':'';
  document.getElementById('route-summary').innerHTML = ex ? K('route_sum_explore') : K('route_sum_direct');
}
function startRoute(){ toast(K('t_startnav')); closeTo(); }

function setSpan(span){
  curSpan = span;
  document.querySelectorAll('#share-seg button').forEach(b=>b.classList.toggle('on', b.dataset.span===span));
  const zh={week:'近一周 · 2 场足迹 · 1 个收藏 · 1 场即将', month:'近一月 · 6 场足迹 · 3 个收藏 · 2 场即将', year:'近一年 · 31 场足迹 · 14 个收藏 · 5 场即将'};
  const en={week:'Past week · 2 visits · 1 saved · 1 upcoming', month:'Past month · 6 visits · 3 saved · 2 upcoming', year:'Past year · 31 visits · 14 saved · 5 upcoming'};
  document.getElementById('pv-span').textContent = (lang==='zh'?zh:en)[span];
}
function tg(id){
  document.getElementById(id).classList.toggle('on');
  if(id==='tg-fav') document.getElementById('pv-fav').style.display = document.getElementById(id).classList.contains('on')?'':'none';
  if(id==='tg-up') document.getElementById('pv-up').style.display = document.getElementById(id).classList.contains('on')?'':'none';
}
function refreshShare(){
  setSpan(curSpan);
  document.getElementById('pv-fav').style.display = document.getElementById('tg-fav').classList.contains('on')?'':'none';
  document.getElementById('pv-up').style.display = document.getElementById('tg-up').classList.contains('on')?'':'none';
}

let toastT;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(toastT); toastT=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)';},1900);
}

/* ===================== LANGUAGE ===================== */
function applyLang(){
  document.documentElement.lang = lang==='zh' ? 'zh-CN' : 'en';
  document.querySelectorAll('[data-i18n]').forEach(el=>{ const k=el.dataset.i18n; if(I18N[k]) el.textContent = I18N[k][lang]; });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{ const k=el.dataset.i18nHtml; if(I18N[k]) el.innerHTML = I18N[k][lang]; });
  document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('on', b.dataset.lang===lang));
  renderExplore(); renderFoot(); renderPoi();
  setTribe(curTopic); setRoute(curRouteMode); setSpan(curSpan);
  hydrateImages(document);
  if(typeof route==='function') route();   // re-render current page (rebuilds open detail in new language)
}
function setLang(l){ lang=l; applyLang(); }

/* ===================== INIT ===================== */
applyLang();
if(!location.hash) history.replaceState(null,'','#/explore');
route();
hydrateImages(document);
</script>
